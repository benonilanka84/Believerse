<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Believerse</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Header with verse and branding -->
  <header class="hero-header">
    <p class="bible-verse">
      “I can do all things through Christ who strengthens me.”<br>
      <span class="verse-ref">— Philippians 4:13</span>
    </p>
    <h1 class="brand-name">Believerse</h1>
    <p class="tagline">One Family in Christ.</p>
  </header>

  <!-- Auth Form -->
  <div class="auth-card">
    <h2>Welcome</h2>
    <p>Sign up or log in to continue</p>
    <form id="auth-form">
  <input 
    type="email" 
    id="email" 
    name="email" 
    placeholder="Email" 
    required 
  />
  
  <input 
    type="password" 
    id="password" 
    name="password" 
    placeholder="Password" 
    required 
  />

  <div class="button-group">
    <button type="button" id="signup-btn">Sign Up</button>
    <button type="button" id="login-btn">Login</button>
  </div>
</form>

<p id="message"></p>

</body>
</html>
