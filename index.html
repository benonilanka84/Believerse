<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Believerse - Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="page-wrap">

  <!-- LEFT PANEL -->
  <section class="left">
    <p class="verse">
      “I can do all things through Christ who strengthens me.”
      <span class="verse-ref"> — Philippians 4:13</span>
    </p>

    <h1 class="brand">
      <span class="the">The</span>
      <span class="gold">B</span>elievers<span class="green">e</span>
    </h1>

    <p class="tagline">One Family in Christ.</p>
  </section>

  <!-- LOGIN CARD -->
  <section class="right">
    <div class="auth-card">
      <h2>Welcome to The Believerse</h2>
      <p class="small">Sign in or create a new account to join the family.</p>

      <form id="login-form" novalidate>
        <input id="login-email" type="email" placeholder="Email address" required />
        <input id="login-password" type="password" placeholder="Password" required />

        <button id="login-btn" class="btn btn-primary" type="button">
          Log in
        </button>

        <a id="forgot-link" class="forgot" href="#">Forgotten password?</a>

        <hr class="divider"/>

        <button id="create-account" class="btn btn-cta" type="button">
          Create new account
        </button>

        <p id="login-message" class="message"></p>
      </form>
    </div>
  </section>

</div>

<script type="module" src="./login.js"></script>

</body>
</html>
