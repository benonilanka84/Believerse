<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Profile - The Believerse</title>
  <link rel="stylesheet" href="profile.css" />
</head>

<body>

<div id="profile-container">

  <div class="profile-card">

    <h2>Profile</h2>

    <div class="avatar-section">
      <img id="avatar-preview" src="https://via.placeholder.com/120" />
      <input type="file" id="avatar-upload" accept="image/*" />
    </div>

    <input id="full_name" type="text" placeholder="Full Name" />
    <input id="username" type="text" placeholder="Username" />

    <label>Date of birth</label>
    <input id="dob" type="date"/>

    <label>Gender</label>
    <select id="gender">
      <option value="Prefer not to say">Prefer not to say</option>
      <option value="Male">Male</option>
      <option value="Female">Female</option>
    </select>

    <input id="country" type="text" placeholder="Country" />
    <input id="church" type="text" placeholder="Church / Ministry" />

    <textarea id="bio" placeholder="Bio..."></textarea>
    <textarea id="faith_journey" placeholder="Faith Journey..."></textarea>

    <button id="save-profile" class="btn">Save Profile</button>
    <button id="logout-btn" class="btn logout">Logout</button>

    <p id="profile-message" class="message"></p>

  </div>

</div>

<script type="module" src="./profile.js"></script>

</body>
</html>
