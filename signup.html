<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account - The Believerse</title>
  <link rel="stylesheet" href="signup.css" />
</head>

<body>

  <header class="signup-header">
    <h1><span class="the">The</span><span class="gold">B</span>elievers<span class="green">e</span></h1>
  </header>

  <div class="signup-card">

    <h2>Create a new account</h2>

    <form id="signup-form">

      <div class="row">
        <input id="first_name" type="text" placeholder="First name" required />
        <input id="last_name" type="text" placeholder="Last name" required />
      </div>

      <label>Date of birth</label>
      <div class="row">
        <select id="dob_day"></select>
        <select id="dob_month"></select>
        <select id="dob_year"></select>
      </div>

      <label>Gender</label>
      <div class="row">
        <label><input type="radio" name="gender" value="Male"> Male</label>
        <label><input type="radio" name="gender" value="Female"> Female</label>
        <label><input type="radio" name="gender" value="Prefer not to say"> Prefer not to say</label>
      </div>

      <input id="signup-email" type="email" placeholder="Email address" required />
      <input id="signup-password" type="password" placeholder="New password" required />

      <label class="checkbox">
        <input id="agree-1" type="checkbox">
        I agree to The Believerse Terms & Conditions.
      </label>

      <label class="checkbox">
        <input id="agree-2" type="checkbox">
        I agree to post only Christian faith–based content and understand unrelated or prohibited content is not allowed.
      </label>

      <button id="signup-btn" type="button" class="btn signup-btn" disabled>
        Sign Up
      </button>

      <p class="small">
        Already have an account?
        <a href="index.html">Sign in</a>
      </p>

      <p id="signup-message" class="message"></p>

    </form>

  </div>

<script type="module" src="./signup.js"></script>

</body>
</html>
